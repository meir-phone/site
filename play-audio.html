<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרחבים - הפעלת הודעות קוליות</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .player-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .playlist-sidebar {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 252, 248, 0.98) 100%);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.08);
            border: 2px solid rgba(76, 175, 80, 0.1);
            position: sticky;
            top: 146px;
            max-height: calc(100vh - 166px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            padding: 1.5rem;
            border-bottom: 2px solid rgba(76, 175, 80, 0.1);
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.08) 0%, rgba(139, 195, 74, 0.08) 100%);
        }

        .playlist-header h3 {
            color: #2d5016;
            font-size: 1.2em;
            font-weight: 700;
            margin: 0 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .playlist-header i {
            color: #4caf50;
            font-size: 1.3em;
        }

        .search-box-small {
            position: relative;
        }

        .search-box-small input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 2px solid rgba(76, 175, 80, 0.2);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .search-box-small i {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4caf50;
        }

        .playlist-content {
            padding: 1rem;
            overflow-y: auto;
            flex: 1;
        }

        .playlist-content::-webkit-scrollbar {
            width: 6px;
        }

        .playlist-content::-webkit-scrollbar-track {
            background: rgba(76, 175, 80, 0.05);
            border-radius: 3px;
        }

        .playlist-content::-webkit-scrollbar-thumb {
            background: rgba(76, 175, 80, 0.3);
            border-radius: 3px;
        }

        .playlist-item {
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(76, 175, 80, 0.1);
            transform: translateX(-3px);
        }

        .playlist-item.active {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.15) 0%, rgba(139, 195, 74, 0.15) 100%);
            border-color: #4caf50;
        }

        .playlist-item-name {
            font-weight: 600;
            color: #2d5016;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .playlist-item-name i {
            color: #4caf50;
        }

        .playlist-item-info {
            font-size: 0.85em;
            color: #5a6c57;
        }

        .player-main {
            min-width: 0;
        }

        .player-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 252, 248, 0.98) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.08);
            border: 2px solid rgba(76, 175, 80, 0.1);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4caf50 0%, #8bc34a 50%, #66bb6a 100%);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 3rem;
        }

        .now-playing-label {
            color: #5a6c57;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .now-playing-title {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #2d5016 0%, #4a7c2c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .now-playing-path {
            color: #5a6c57;
            font-size: 1em;
            font-family: 'Courier New', monospace;
        }

        .audio-visualizer {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.05) 0%, rgba(139, 195, 74, 0.05) 100%);
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 1rem;
        }

        .visualizer-bar {
            width: 8px;
            background: linear-gradient(180deg, #4caf50 0%, #8bc34a 100%);
            border-radius: 4px;
            transition: height 0.1s ease;
        }

        .audio-player {
            width: 100%;
            margin-bottom: 2rem;
        }

        .audio-player audio {
            width: 100%;
            height: 60px;
            border-radius: 15px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(139, 195, 74, 0.1) 100%);
            color: #4caf50;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2) 0%, rgba(139, 195, 74, 0.2) 100%);
            transform: scale(1.1);
        }

        .control-btn.play-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
            color: white;
            font-size: 2em;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .control-btn.play-btn:hover {
            background: linear-gradient(135deg, #45a049 0%, #7cb342 100%);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.5);
        }

        .player-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.05) 0%, rgba(139, 195, 74, 0.05) 100%);
            border-radius: 15px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #5a6c57;
            font-size: 0.9em;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .info-value {
            color: #2d5016;
            font-size: 1.3em;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #5a6c57;
        }

        .empty-state i {
            font-size: 5em;
            color: rgba(76, 175, 80, 0.3);
            margin-bottom: 1.5rem;
        }

        .empty-state h3 {
            font-size: 1.8em;
            color: #2d5016;
            margin-bottom: 1rem;
        }

        @media (max-width: 1024px) {
            .player-layout {
                grid-template-columns: 1fr;
            }

            .playlist-sidebar {
                position: relative;
                top: 0;
                max-height: 400px;
            }
        }
    </style>
</head>
<body class="secondary-page">
    <header class="header">
        <div class="logo">
            <img src="logo.png" alt="מרחבים" class="logo-img">
        </div>
        <nav class="header-links">
            <a href="play-audio.html" class="header-link active">נגן שירים</a>
            <a href="file-manager.html" class="header-link">מנהל קבצים</a>
            <a href="statistics.html" class="header-link">סטטיסטיקות</a>
            <a href="dashboard.html" class="header-link">תלמידים</a>
            <a href="index.html" class="header-link">דף הבית</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h2>נגן הודעות קוליות</h2>
            <div class="header-actions">
                <button class="refresh-btn" onclick="loadAudioFiles()">
                    <i class="fas fa-sync-alt"></i>
                    רענן
                </button>
            </div>
        </div>

        <div class="player-layout">
            <!-- Playlist Sidebar -->
            <aside class="playlist-sidebar">
                <div class="playlist-header">
                    <h3><i class="fas fa-list-music"></i> רשימת שירים</h3>
                    <div class="search-box-small">
                        <i class="fas fa-search"></i>
                        <input type="text" id="playlistSearch" placeholder="חיפוש...">
                    </div>
                </div>
                <div class="playlist-content" id="playlistContent">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> טוען...</div>
                </div>
            </aside>

            <!-- Player Main -->
            <div class="player-main">
                <div class="player-card" id="playerCard">
                    <div class="empty-state">
                        <i class="fas fa-music"></i>
                        <h3>בחר שיר מהרשימה</h3>
                        <p>בחר קובץ שמע מהרשימה בצד כדי להתחיל להאזין</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="play-audio.js"></script>
</body>
</html>
